data:
  spider_vi:
    dev: data/spider_vi/dev.json
    db_dir: data/spider_vi/database
  bird_vi:
    dev: data/bird_vi/dev.json
    db_dir: data/bird_vi/database

augmentation:
  model: Qwen/Qwen2.5-7B-Instruct
  output_dir: augmentation/augmented_schemas
  max_retries: 3
  temperature: 0.1
  max_new_tokens: 1024
  device: cpu  # -> cuda on GPU server

linking:
  model: intfloat/multilingual-e5-large
  top_k: 10
  min_tables: 1
  always_include_pk: true
  device: cpu  # -> cuda on GPU server

generation:
  models:
    - Qwen/Qwen2.5-Coder-0.5B-Instruct
    - Qwen/Qwen2.5-Coder-1.5B-Instruct
    - Qwen/Qwen2.5-Coder-3B-Instruct
    - Qwen/Qwen2.5-Coder-7B-Instruct
  max_new_tokens: 256
  temperature: 0.0
  device: cpu  # -> cuda on GPU server

evaluation:
  results_dir: evaluation/results
  alpha: 0.05
